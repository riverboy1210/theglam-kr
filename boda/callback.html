<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="naver-site-verification" content="f5e6ef9b14fafab6e7d12b5f3a13f433f84a91de">
  <meta name="google-site-verification" content="ddkEOwCZrlrsWD8FW1dT7T9nLVVEKOM1Rdm8E5VuaOg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="./images/favicon.svg">
  <title>로그인 처리 중 | 보다 BODA</title>
  <link rel="stylesheet" href="./shared.css">
  <style>
    .cb-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:16px; text-align:center; }
    .cb-spinner { width:40px; height:40px; border:4px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .cb-error { color:var(--danger); max-width:400px; }
  </style>
</head>
<body>
  <main class="main-content">
    <div class="container">
      <div class="cb-wrap" id="cb-content">
        <div class="cb-spinner"></div>
        <p class="text-muted">로그인 처리 중입니다...</p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var errorCode = params.get('error_code');
      var wrap = document.getElementById('cb-content');

      if (errorCode) {
        wrap.innerHTML = '<p class="cb-error">로그인 중 오류가 발생했습니다: ' +
          (params.get('error_description') || '알 수 없는 오류') +
          '</p><a href="/community.html" class="btn-primary" style="display:inline-block;padding:10px 24px;border-radius:var(--radius);text-decoration:none;">돌아가기</a>';
        return;
      }

      if (typeof BODA_DB === 'undefined') {
        wrap.innerHTML = '<p class="cb-error">설정 오류입니다. 관리자에게 문의하세요.</p>';
        return;
      }

      BODA_DB.onAuthChange(function (event, session) {
        if (event === 'SIGNED_IN' && session) {
          window.history.replaceState({}, document.title, window.location.pathname);
          window.location.href = '/community.html';
        }
      });

      setTimeout(function () {
        wrap.innerHTML = '<p class="cb-error">로그인 처리 시간이 초과되었습니다.</p>' +
          '<a href="/community.html" class="btn-primary" style="display:inline-block;padding:10px 24px;border-radius:var(--radius);text-decoration:none;">돌아가기</a>';
      }, 15000);
    })();
  </script>
</body>
</html>
