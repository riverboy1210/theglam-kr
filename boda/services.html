  <style>
    .services-layout { display: grid; gap: 14px; }
    .panel { background: #fff; border: 1px solid var(--border-light); border-radius: 14px; box-shadow: 0 10px 24px rgba(17, 24, 39, 0.06); padding: 14px; }
    .search-row { display: grid; gap: 8px; margin-bottom: 12px; }
    .search-input-box { width: 100%; padding: 10px 14px; border-radius: var(--radius-full); border: 1px solid var(--border); font-size: 0.9rem; font-family: inherit; }
    .filter-section { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--border); }
    .filter-title { margin: 0 0 8px; font-size: 0.83rem; color: var(--text-muted); font-weight: 700; }
    .check-grid { display: grid; gap: 6px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .check-item { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--text); }
    .result-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 10px 0; }
    .sort-select { border: 1px solid var(--border); border-radius: var(--radius-full); padding: 8px 12px; font-size: 0.82rem; font-family: inherit; background: #fff; }
    .cards-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .service-card { padding: 14px; }
    .service-head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .service-name { margin: 0; font-size: 1rem; font-weight: 800; letter-spacing: -0.01em; }
    .service-meta { margin: 6px 0; color: var(--text-muted); font-size: 0.82rem; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .service-actions { display: flex; gap: 8px; margin-top: 10px; }
    .empty-state { border: 1px dashed #f4bfd8; border-radius: 14px; background: #fff; color: var(--text-muted); text-align: center; padding: 26px 14px; }
    @media (min-width: 900px) {
      .services-layout { grid-template-columns: 280px minmax(0, 1fr); align-items: start; }
      .panel.sticky { position: sticky; top: 72px; }
      .cards-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>

  <main class="main-content"><div class="container"><div class="section-header"><h1 class="section-title">서비스 찾기</h1><a class="section-more" href="./compare.html">비교함 보기 ›</a></div><div class="services-layout"><aside class="panel sticky"><div class="search-row"><input id="search-input" class="search-input-box" type="search" placeholder="서비스명으로 검색"></div><section class="filter-section"><h2 class="filter-title">유형</h2><div id="type-filters" class="check-grid"></div></section><section class="filter-section"><h2 class="filter-title">분야</h2><div id="specialty-filters" class="check-grid"></div></section><section class="filter-section"><h2 class="filter-title">방식</h2><div id="method-filters" class="check-grid"></div></section><section class="filter-section"><h2 class="filter-title">가격대</h2><div id="price-filters" class="check-grid"></div></section><section class="filter-section"><h2 class="filter-title">상담종류</h2><div id="counseling-filters" class="check-grid"></div></section></aside><section><div class="panel"><div class="result-toolbar"><strong id="result-count">0개 서비스</strong><select id="sort-select" class="sort-select" aria-label="정렬 기준"><option value="reviews">후기 많은순</option><option value="rating">평점순</option><option value="price">가격 낮은순</option><option value="latest">최신 등록순</option></select></div><div id="services-grid" class="cards-grid"></div></div></section></div></div></main>

  <nav class="bottom-nav"><a href="/" class="bottom-nav-item"><span class="nav-icon">🏠</span><span>홈</span></a><a href="/services.html" class="bottom-nav-item active"><span class="nav-icon">🔍</span><span>서비스</span></a><a href="/reviews.html" class="bottom-nav-item"><span class="nav-icon">⭐</span><span>후기</span></a><a href="/compare.html" class="bottom-nav-item"><span class="nav-icon">🆚</span><span>비교</span></a><a href="/articles.html" class="bottom-nav-item"><span class="nav-icon">📰</span><span>콘텐츠</span></a></nav>
  <script src="./shared-data.js"></script>
  <script>
    (function initServicesPage() {
      const data = window.BODA_DATA || {};
      const allServices = Array.isArray(data.SERVICES) ? data.SERVICES.slice() : [];
      const serviceTypes = Array.isArray(data.SERVICE_TYPES) ? data.SERVICE_TYPES : [];
      const consultationTypes = Array.isArray(data.CONSULTATION_TYPES) ? data.CONSULTATION_TYPES : [];
      const methods = Array.isArray(data.METHODS) ? data.METHODS : [];
      const prices = Array.isArray(data.PRICE_RANGES) ? data.PRICE_RANGES : [];
      const qs = new URLSearchParams(window.location.search);
      const state = { search: '', types: new Set(), specialties: new Set(), methods: new Set(), prices: new Set(), counselings: new Set(), sort: 'reviews' };
      const grid = document.getElementById('services-grid');
      const countEl = document.getElementById('result-count');
      const sortEl = document.getElementById('sort-select');
      const searchEl = document.getElementById('search-input');
      const idToName = { consult: Object.fromEntries(consultationTypes.map((x) => [x.id, x.name])), method: Object.fromEntries(methods.map((x) => [x.id, x.name])), price: Object.fromEntries(prices.map((x) => [x.id, x.name])) };

      function renderChecks(targetId, items, bucket) {
        const wrap = document.getElementById(targetId);
        wrap.innerHTML = items.map((item, idx) => `<label class="check-item"><input type="checkbox" id="${targetId}-${idx}" value="${item}"> <span>${item}</span></label>`).join('');
        wrap.addEventListener('change', (event) => {
          const box = event.target;
          if (!box || box.type !== 'checkbox') return;
          if (box.checked) bucket.add(box.value); else bucket.delete(box.value);
          render();
        });
      }

      function hasAny(haystack, selected) { if (!selected.size) return true; return haystack.some((item) => selected.has(item)); }
      function priceRank(label) { const order = ['무료', '1만원 미만', '1만원 이하', '1~3만원', '3~5만원', '5만원 이상']; const idx = order.indexOf(label); return idx === -1 ? 999 : idx; }

      function sortServices(items) {
        const sorted = items.slice();
        if (state.sort === 'reviews') sorted.sort((a, b) => (b.reviewCount || 0) - (a.reviewCount || 0));
        else if (state.sort === 'rating') sorted.sort((a, b) => (b.rating || 0) - (a.rating || 0));
        else if (state.sort === 'price') sorted.sort((a, b) => priceRank(a.priceRange) - priceRank(b.priceRange));
        else sorted.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
        return sorted;
      }

      function addToCompare(serviceId) {
        const key = 'boda_compare_ids';
        const existing = JSON.parse(localStorage.getItem(key) || '[]');
        const next = Array.from(new Set(existing.concat(serviceId))).slice(0, 3);
        localStorage.setItem(key, JSON.stringify(next));
        window.location.href = `./compare.html?ids=${encodeURIComponent(next.join(','))}`;
      }

      function cardHtml(service) {
        const method = Array.isArray(service.method) ? service.method.slice(0, 2).join(' · ') : '상담 방식 미확인';
        const specialty = Array.isArray(service.specialty) ? service.specialty.slice(0, 2).join(' · ') : '분야 미확인';
        const rating = typeof service.rating === 'number' ? `★ ${service.rating.toFixed(1)}` : '평점 준비중';
        const reviews = typeof service.reviewCount === 'number' ? `후기 ${service.reviewCount.toLocaleString()}` : '후기 집계중';
        return `<article class="card service-card"><div class="service-head"><h3 class="service-name">${service.name}</h3><span class="badge badge-hot">${service.priceRange || '가격 미확인'}</span></div><p class="service-meta">${service.summary || '서비스 소개 준비중'}</p><div class="tag-row"><span class="tag tag-category">${service.type || '유형 미확인'}</span><span class="tag">${method}</span><span class="tag">${specialty}</span></div><div class="service-meta">${rating} · ${reviews}</div><div class="service-actions"><a class="btn-primary" href="./service.html?id=${encodeURIComponent(service.id)}">상세보기</a><button class="btn-outline" type="button" data-compare="${service.id}">비교담기</button></div></article>`;
      }

      function render() {
        const filtered = allServices.filter((service) => {
          const name = (service.name || '').toLowerCase();
          const summary = (service.summary || '').toLowerCase();
          const specialty = Array.isArray(service.specialty) ? service.specialty : [];
          const method = Array.isArray(service.method) ? service.method : [];
          const counseling = Array.isArray(service.counselingType) ? service.counselingType : [];
          const price = service.priceRange || '미확인';
          if (state.search && !name.includes(state.search) && !summary.includes(state.search)) return false;
          if (state.types.size && !state.types.has(service.type)) return false;
          if (!hasAny(specialty, state.specialties)) return false;
          if (!hasAny(method, state.methods)) return false;
          if (state.prices.size && !state.prices.has(price)) return false;
          if (!hasAny(counseling, state.counselings)) return false;
          return true;
        });
        const sorted = sortServices(filtered);
        countEl.textContent = `${sorted.length}개 서비스`;
        if (!sorted.length) { grid.innerHTML = '<div class="empty-state">조건에 맞는 서비스가 없습니다. 필터를 조정해보세요.</div>'; return; }
        grid.innerHTML = sorted.map(cardHtml).join('');
      }

      renderChecks('type-filters', serviceTypes.map((x) => x.name), state.types);
      renderChecks('specialty-filters', consultationTypes.map((x) => x.name), state.specialties);
      renderChecks('method-filters', methods.map((x) => x.name), state.methods);
      renderChecks('price-filters', prices.map((x) => x.name), state.prices);
      const counselingSet = new Set();
      allServices.forEach((service) => {
        (service.counselingType || []).forEach((item) => {
          counselingSet.add(item);
        });
      });
      renderChecks('counseling-filters', Array.from(counselingSet), state.counselings);
      searchEl.addEventListener('input', () => { state.search = searchEl.value.trim().toLowerCase(); render(); });
      sortEl.addEventListener('change', () => { state.sort = sortEl.value; render(); });
      grid.addEventListener('click', (event) => { const button = event.target.closest('button[data-compare]'); if (button) addToCompare(button.getAttribute('data-compare')); });

      if (qs.get('type') && idToName.consult[qs.get('type')]) {
        const name = idToName.consult[qs.get('type')]; state.specialties.add(name);
        const checkbox = document.querySelector(`#specialty-filters input[value="${name}"]`); if (checkbox) checkbox.checked = true;
      }
      if (qs.get('method') && idToName.method[qs.get('method')]) {
        const name = idToName.method[qs.get('method')]; state.methods.add(name);
        const checkbox = document.querySelector(`#method-filters input[value="${name}"]`); if (checkbox) checkbox.checked = true;
      }
      if (qs.get('price') && idToName.price[qs.get('price')]) {
        const name = idToName.price[qs.get('price')]; state.prices.add(name);
        const checkbox = document.querySelector(`#price-filters input[value="${name}"]`); if (checkbox) checkbox.checked = true;
      }
      render();
    })();
  </script>
</body>
